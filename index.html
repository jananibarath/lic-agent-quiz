<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIC Agent Quiz Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>LIC Exam Prep Dashboard</h1>
      <div class="pill" id="sessionBadge">No active session</div>
    </header>

    <main>
      <section id="homeScreen" class="screen active"></section>
      <section id="quizScreen" class="screen"></section>
      <section id="resultsScreen" class="screen"></section>
      <section id="mistakesScreen" class="screen"></section>
      <section id="reviewScreen" class="screen"></section>
    </main>
  </div>

  <template id="statCardTemplate">
    <article class="stat-card">
      <h3></h3>
      <p></p>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
